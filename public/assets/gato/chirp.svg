<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Placeholder: Chirping cat (alert, excited) -->
  <!-- Ears (perked up) -->
  <polygon points="55,68 70,22 85,68" fill="#f5a623" stroke="#2D2A26" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="115,68 130,22 145,68" fill="#f5a623" stroke="#2D2A26" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="62,66 70,34 78,66" fill="#f8c471"/>
  <polygon points="122,66 130,34 138,66" fill="#f8c471"/>
  <!-- Head -->
  <ellipse cx="100" cy="90" rx="50" ry="40" fill="#f5a623" stroke="#2D2A26" stroke-width="3"/>
  <!-- Big excited eyes -->
  <ellipse cx="82" cy="83" rx="10" ry="12" fill="white" stroke="#2D2A26" stroke-width="2"/>
  <ellipse cx="118" cy="83" rx="10" ry="12" fill="white" stroke="#2D2A26" stroke-width="2"/>
  <ellipse cx="83" cy="82" rx="5" ry="7" fill="#2D2A26"/>
  <ellipse cx="119" cy="82" rx="5" ry="7" fill="#2D2A26"/>
  <!-- Eye sparkles -->
  <circle cx="86" cy="79" r="2" fill="white"/>
  <circle cx="122" cy="79" r="2" fill="white"/>
  <!-- Nose -->
  <polygon points="100,96 96,101 104,101" fill="#e8838a"/>
  <!-- Small open mouth (chirp shape) -->
  <ellipse cx="100" cy="107" rx="6" ry="5" fill="#c0392b" stroke="#2D2A26" stroke-width="2"/>
  <!-- Whiskers -->
  <line x1="48" y1="92" x2="76" y2="98" stroke="#2D2A26" stroke-width="1.5"/>
  <line x1="48" y1="102" x2="76" y2="102" stroke="#2D2A26" stroke-width="1.5"/>
  <line x1="124" y1="98" x2="152" y2="92" stroke="#2D2A26" stroke-width="1.5"/>
  <line x1="124" y1="102" x2="152" y2="102" stroke="#2D2A26" stroke-width="1.5"/>
  <!-- Body -->
  <ellipse cx="100" cy="155" rx="40" ry="35" fill="#f5a623" stroke="#2D2A26" stroke-width="3"/>
  <!-- Paws (one slightly raised) -->
  <ellipse cx="75" cy="178" rx="12" ry="8" fill="#f8c471" stroke="#2D2A26" stroke-width="2"/>
  <ellipse cx="120" cy="180" rx="12" ry="8" fill="#f8c471" stroke="#2D2A26" stroke-width="2"/>
  <!-- Raised paw -->
  <ellipse cx="65" cy="160" rx="10" ry="7" fill="#f8c471" stroke="#2D2A26" stroke-width="2" transform="rotate(-20,65,160)"/>
  <!-- Tail (up and alert) -->
  <path d="M140,148 Q178,115 168,80" fill="none" stroke="#f5a623" stroke-width="8" stroke-linecap="round"/>
  <path d="M140,148 Q178,115 168,80" fill="none" stroke="#2D2A26" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <!-- Chirp effect -->
  <text x="130" y="65" font-size="16" fill="#f5a623" font-family="sans-serif" font-weight="bold">!</text>
</svg>
